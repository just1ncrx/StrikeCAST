name: StrikeCAST – Gewitterwahrscheinlichkeit

on:
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # Alles in einem Run – kein Artifact-Upload
  # ─────────────────────────────────────────────
  strikecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set DATE & RUN
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          RUN=$(date -u +%H)
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "RUN=$RUN"   >> $GITHUB_ENV
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "run=$RUN"   >> $GITHUB_OUTPUT
          echo "UTC: $DATE  Run: $RUN"

      - name: Download LUT
        run: |
          mkdir -p data/lut
          curl -L https://github.com/just1ncrx/StrikeCAST/releases/download/v1.0/lightning_lut.nc \
               -o data/lut/lightning_lut.nc

      - name: Download ECMWF data
        run: python scripts/download_gewitter.py

      - name: Process – Prädiktoren berechnen
        run: python scripts/process_gewitter.py

      - name: Generate PNGs
        run: |
          mkdir -p pngs/gewitter
          python scripts/gewitter.py

      - name: Generate metadata
        run: |
          python scripts/generate_metadata.py \
            pngs/gewitter \
            ${{ steps.meta.outputs.run }} \
            ${{ steps.meta.outputs.date }}

      - name: Clean old runs on R2
        run: |
          CURRENT_RUN="${{ steps.meta.outputs.run }}"
          for folder in $(aws s3 ls s3://${{ secrets.R2_BUCKET }}/strikecast/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            | awk '{print $2}' | sed 's#/##'); do
            if [ "$folder" != "$CURRENT_RUN" ]; then
              aws s3 rm s3://${{ secrets.R2_BUCKET }}/strikecast/$folder \
                --recursive \
                --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
              echo "Gelöscht: $folder"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload PNGs to R2
        run: |
          aws s3 sync pngs/gewitter/ \
            s3://${{ secrets.R2_BUCKET }}/strikecast/${{ steps.meta.outputs.run }}/gewitter/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload metadata.json to R2
        run: |
          aws s3 cp pngs/metadata.json \
            s3://${{ secrets.R2_BUCKET }}/strikecast/metadata.json \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
